name: Keepalive Workflow

on:
  schedule:
    - cron: '0 0 1 * *' # Runs once a month on the 1st

jobs:
  keepalive:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Keep Repository Active
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Capture current date/time to make every commit truly unique
          CURRENT_DATE=$(date +"%Y-%m-%d %H:%M:%S")
          
          echo "$CURRENT_DATE" > keepalive.txt
          git add keepalive.txt
          git commit -m "chore: automated keepalive activity ($CURRENT_DATE)"
          git push
